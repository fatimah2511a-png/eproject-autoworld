 <style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --muted:#6b7a90;
  --text:#1a1f2b;
  --accent:#2563eb;
  --good:#16a34a;
  --border:rgba(0,0,0,0.08);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* Navbar */
.navbar{
  background:transparent;
  padding:1rem 0;
}

/* Header */
.title{
  font-size:2rem;
  font-weight:600;
  letter-spacing:0.5px;
}

.subtitle{
  color:var(--muted);
  font-size:0.95rem;
}

/* Sticky Header */
.sticky-bar{
  position:sticky;
  top:0;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.7);
  border-bottom:1px solid var(--border);
  z-index:10;
}

/* Panels */
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1rem;
  box-shadow:0 4px 20px rgba(0,0,0,0.04);
}

/* Car Strip */
.car-strip{
  display:flex;
  gap:1rem;
  overflow-x:auto;
  padding-bottom:1rem;
}

/* Car Cards */
.car-card{
  min-width:260px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1rem;
  transition:0.25s;
}

.car-card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* Images */
.car-img{
  width:100%;
  border-radius:12px;
  margin-bottom:0.75rem;
}

/* Price */
.price{
  font-size:1.3rem;
  font-weight:600;
  color:var(--accent);
}

/* Buttons */
.btn-accent{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:6px 10px;
  font-size:0.85rem;
  transition:0.2s;
}

.btn-accent:hover{
  background:#1d4ed8;
}

.btn-ghost{
  background:#f1f5f9;
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:6px 10px;
  font-size:0.85rem;
}

/* Table */
.compare-table{
  width:100%;
  border-collapse:collapse;
}

.compare-table th,
.compare-table td{
  padding:14px;
  border-bottom:1px solid var(--border);
  text-align:center;
}

.compare-table th{
  color:var(--muted);
  font-weight:500;
}

.compare-table td{
  color:var(--text);
}

/* Highlight Best Values */
.highlight{
  color:var(--good);
  font-weight:600;
}

/* Filters */
.filter-bar select{
  background:#fff;
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:8px;
}

/* Scrollbar (optional nice touch) */
.car-strip::-webkit-scrollbar{
  height:6px;
}

.car-strip::-webkit-scrollbar-thumb{
  background:#d1d5db;
  border-radius:10px;
}

.navbar-custom {
        display: flex;
        align-items: center;
    }

    /* Prevent logo from stretching navbar */
    .navbar-logo {
        height: 150px;
        width: 200px;
        object-fit: contain;
    }

    /* Keep links centered */
    .nav {
        align-items: center;
    }

    .navbar-custom {
        background: #ffffff;
        border-bottom: 1px solid #eaeaea;
    }

    /* Links style */
    .nav-btn {
        color: #333;
        font-weight: 500;
        margin: 0 8px;
        padding: 8px 12px;
        border-radius: 6px;
        transition: 0.3s;
    }

    /* Hover effect */
    .nav-btn:hover {
        background-color: #0d6efd;
        color: white;
        transform: translateY(-2px);
    }

    /* Remove default underline effect */
    .nav-link {
        text-decoration: none;
    }

    input {
    text-align: center;
    }

     .footer-icon {
        width: 45px;
        height: 45px;
        transition: 0.3s;
        cursor: pointer;
    }

    .footer-icon:hover {
        transform: scale(1.1);
    }

    /* Footer links */
    .footer-link {
        color: #ccc;
        margin: 0 8px;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
    }

    .footer-link:hover {
        color: #ffffff;
    }

</style>
</head>

  <div class="container py-4">

  <!-- Header -->
  <div class="sticky-bar py-3 mb-3">
    <div class="title">Car Comparison</div>
    <div class="subtitle">Tesla-style minimalist vehicle comparison experience</div>
  </div>

  <!-- Filters -->
  <div class="panel filter-bar mb-3 d-flex flex-wrap gap-2">
    <select id="fuelFilter" onchange="applyFilters()">
      <option value="">Fuel</option>
      <option value="Petrol">Petrol</option>
      <option value="Diesel">Diesel</option>
      <option value="Electric">Electric</option>
    </select>

    <select id="transFilter" onchange="applyFilters()">
      <option value="">Transmission</option>
      <option value="Automatic">Automatic</option>
      <option value="Manual">Manual</option>
    </select>

    <select id="sortSelect" onchange="render()">
      <option value="">Sort</option>
      <option value="price">Price</option>
      <option value="Mileage">Mileage</option>
    </select>

    <select id="carSelect"></select>
    <button class="btn-accent" onclick="addCar()">Add</button>
  </div>

  <!-- Horizontal Cards (Tesla-style strip) -->
  <div class="panel mb-3">
    <div class="car-strip" id="carStrip"></div>
  </div>

  <!-- Comparison Table -->
  <div class="panel">
    <table class="compare-table" id="table"></table>
  </div>

</div>

<script>
const cars=[
  {id:1,name:"Tesla Model 3",price:42000,image:"https://via.placeholder.com/300x180",specs:{Mileage:12000,Fuel:"Electric",Transmission:"Automatic",Range:"450km"}},
  {id:2,name:"BMW i4",price:48000,image:"https://via.placeholder.com/300x180",specs:{Mileage:8000,Fuel:"Electric",Transmission:"Automatic",Range:"420km"}},
  {id:3,name:"Audi A4",price:39000,image:"https://via.placeholder.com/300x180",specs:{Mileage:15000,Fuel:"Petrol",Transmission:"Automatic",Range:"650km"}},
  {id:4,name:"Toyota Corolla",price:25000,image:"https://via.placeholder.com/300x180",specs:{Mileage:22000,Fuel:"Petrol",Transmission:"Manual",Range:"700km"}}
];

let selected=[];
let filters={fuel:"",trans:""};

const carSelect=document.getElementById("carSelect");

function init(){
  carSelect.innerHTML=cars.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
  renderStrip();
}

function applyFilters(){
  filters.fuel=document.getElementById("fuelFilter").value;
  filters.trans=document.getElementById("transFilter").value;
}

function filteredCars(){
  return cars.filter(c=>{
    if(filters.fuel && c.specs.Fuel!==filters.fuel) return false;
    if(filters.trans && c.specs.Transmission!==filters.trans) return false;
    return true;
  });
}

function addCar(){
  const id=+carSelect.value;
  const car=cars.find(c=>c.id===id);
  if(car && !selected.find(x=>x.id===id)) selected.push(car);
  render();
}

function removeCar(id){
  selected=selected.filter(c=>c.id!==id);
  render();
}

function renderStrip(){
  const strip=document.getElementById("carStrip");
  strip.innerHTML=filteredCars().map(c=>`
    <div class="car-card">
      <img class="car-img" src="${c.image}"/>
      <div class="price">$${c.price}</div>
      <div>${c.name}</div>
      <button class="btn-accent mt-2" onclick="addFromStrip(${c.id})">Add</button>
    </div>
  `).join("");
}

function addFromStrip(id){
  carSelect.value=id;
  addCar();
}

function render(){
  renderStrip();

  const table=document.getElementById("table");
  if(selected.length===0){ table.innerHTML=""; return; }

  let sorted=[...selected];
  const sort=document.getElementById("sortSelect").value;

  if(sort=="price") sorted.sort((a,b)=>a.price-b.price);
  if(sort=="Mileage") sorted.sort((a,b)=>a.specs.Mileage-b.specs.Mileage);

  const keys=Object.keys(sorted[0].specs);

  let html=`<tr><th>Feature</th>`;
  sorted.forEach(c=>{
    html+=`<th>${c.name}<br><button class='btn-ghost mt-1' onclick='removeCar(${c.id})'>Remove</button></th>`;
  });
  html+=`</tr>`;

  html+=`<tr><td>Price</td>`;
  const bestPrice=Math.min(...sorted.map(c=>c.price));
  sorted.forEach(c=>{
    html+=`<td class='${c.price===bestPrice?"highlight":""}'>$${c.price}</td>`;
  });
  html+=`</tr>`;

  keys.forEach(k=>{
    html+=`<tr><td>${k}</td>`;
    const numeric=typeof sorted[0].specs[k]==="number";
    const best=numeric?Math.min(...sorted.map(c=>c.specs[k])):null;

    sorted.forEach(c=>{
      const val=c.specs[k];
      html+=`<td class='${best && val===best?"highlight":""}'>${val}</td>`;
    });
    html+=`</tr>`;
  });

  table.innerHTML=html;
}

init();
</script>
