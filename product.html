<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container d-flex justify-content-between align-items-center navbar-custom">
        <!-- Logo -->
        <div class="d-flex align-items-center">
            <img src="logos/Auto world logo.png" width="70" height="90" alt="AutoWorld Logo" class="navbar-logo me-2">
            <!-- <h4 class="m-0 fw-bold text-dark">AutoWorld</h4> -->
        </div>

        <!-- Links -->
        <ul class="nav align-items-center">
            <li class="nav-item"><a class="nav-link nav-btn" href="AutoWorld.html">Home</a></li>
            <li class="nav-item"><a class="nav-link nav-btn" href="Catalogue.html">Catalogue</a></li>
            <li class="nav-item"><a class="nav-link nav-btn" href="schemes.html">Schemes</a></li>
            <li class="nav-item"><a class="nav-link nav-btn" href="Car Finance.html">Finance</a></li>
            <li class="nav-item"><a class="nav-link nav-btn" href="Compare Cars.html">Compare</a></li>
            <li class="nav-item"><a class="nav-link nav-btn" href="About.html">About</a></li>
            <li class="nav-item"><a class="nav-link nav-btn" href="contact us.html">Contact</a></li>
        </ul>

    </div>
    
    <div class="container my-4" id="details-container">
        <!-- Content will be injected here -->
    </div>

    <footer class="mt-5 pt-5 bg-dark">
        <div class="d-flex justify-content-center gap-2">
            <img src="logos/Facebook logo.png" style="width: 50px; height: 50px;" class="rounded-circle">
            <img src="logos/Insta logo.jpg" style="width: 50px; height: 50px;" class="rounded-circle">
            <img src="logos/Twitter logo.png" style="width: 50px; height: 50px;" class="rounded-circle">
        </div>

        <div class="mx-auto w-25 mt-3 text-center">
            <a class="px-1 text-decoration-none text-white" href="AutoWorld.html">Home</a>
            <a class="px-1 text-decoration-none text-white" href="Catalogue.html">Catalogue</a>
        </div>
        
        <p class="text-center mt-3 text-secondary"> © 2023 AutoWorld. -All Rights Reserved.</p>
    </footer>

    <!-- Car data -->
    <script src="cars_information.js"></script>

    <script>
        // Get ID from URL
        const params = new URLSearchParams(window.location.search);
        const carId = params.get("id");

        // Find car
        const car = cars.find(c => c.id == carId);

        const container = document.getElementById("details-container");

        if (car) {
        container.innerHTML = `
        <div class="row">
            <!-- Left Section -->
            <div class="col-md-8">

            <!-- Image Carousel -->
            <div id="carCarousel" class="carousel slide mb-4" data-bs-ride="carousel">
                <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="${car.image}" class="d-block w-100" alt="${car["Car Name"]}">
                </div>
                </div>
            </div>

            <!-- Title -->
            <h2>${car["Model Year"]} ${car["Car Name"]}</h2>
            <p class="text-muted">Location: Karachi</p>

            <!-- Specifications -->
            <div class="card mb-4">
                <div class="card-header">Specifications</div>
                <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">Mileage: ${car.Mileage}</li>
                        <li class="list-group-item">Fuel: ${car["Engine/Hybrid/Electric"]}</li>
                        <li class="list-group-item">Transmission: ${car["Auto/Manual"]}</li>
                    </ul>
                    </div>
                    <div class="col-md-6">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">Year: ${car["Model Year"]}</li>
                        <li class="list-group-item">Engine: ${car["Engine Power (CC)"]}</li>
                        <li class="list-group-item">City: Karachi</li>
                    </ul>
                    </div>
                </div>
                </div>
            </div>

            <!-- Description -->
            <div class="card mb-4">
                <div class="card-header">Description</div>
                <div class="card-body">
                <p>${car.description || "No description available."}</p>
                </div>
            </div>

            <!-- Features -->
            <div class="card mb-4">
                <div class="card-header">Features</div>
                <div class="card-body">
                <ul>
                    <li>Air Conditioning</li>
                    <li>ABS</li>
                    <li>Airbags</li>
                    <li>Bluetooth</li>
                </ul>
                </div>
            </div>

            </div>

            <!-- Right Sidebar -->
            <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-body">
                <h3 class="text-primary">${car.Price}</h3>
                <button class="btn btn-success w-100 mb-2">Contact Seller</button>
                <button class="btn btn-outline-secondary w-100">Add to Favorites</button>
                </div>
            </div>

            <!-- Seller Info -->
            <div class="card mb-4">
                <div class="card-header">Seller Info</div>
                <div class="card-body">
                <p><strong>AutoWorld Dealer</strong></p>
                <p>Dealer</p>
                <p>Phone: +92 300 0000000</p>
                </div>
            </div>

            <!-- Map -->
            <div class="card">
                <div class="card-header">Location</div>
                <div class="card-body">
                <iframe src="https://maps.google.com/maps?q=Karachi&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    width="100%" height="200" style="border:0;"></iframe>
                </div>
            </div>

            </div>
        </div>
        `;
        } else {
        container.innerHTML = `<h3>Car not found</h3>`;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
