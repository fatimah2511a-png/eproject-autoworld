    <style>
    .specs span::after {
        content: "|";
        margin-left: 8px;
        color: #888;
    }

    .specs span:last-child::after {
    content: "";
    }

    .footer-icon {
        width: 45px;
        height: 45px;
        transition: 0.3s;
        cursor: pointer;
    }

    .footer-icon:hover {
        transform: scale(1.1);
    }

    /* Footer links */
    .footer-link {
        color: #ccc;
        margin: 0 8px;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
    }

    .footer-link:hover {
        color: #ffffff;
    }

    .navbar-custom {
        display: flex;
        align-items: center;
    }

    /* Prevent logo from stretching navbar */
    .navbar-logo {
        height: 150px;
        width: 200px;
        object-fit: contain;
    }

    /* Keep links centered */
    .nav {
        align-items: center;
    }

    .navbar-custom {
        background: #ffffff;
        border-bottom: 1px solid #eaeaea;
    }

    /* Links style */
    .nav-btn {
        color: #333;
        font-weight: 500;
        margin: 0 8px;
        padding: 8px 12px;
        border-radius: 6px;
        transition: 0.3s;
    }

    /* Hover effect */
    .nav-btn:hover {
        background-color: #0d6efd;
        color: white;
        transform: translateY(-2px);
    }

    /* Remove default underline effect */
    .nav-link {
        text-decoration: none;
    }

    input {
    text-align: center;
    }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


    <!-- this script contains car data -->
    <script src="cars_information.js"></script>
    <!-- add scripts to dynamically load cards -->
    <script>
        const container = document.getElementById("product-container");

        cars.forEach(car => {
        const col = document.createElement("div");
        col.className = "col-md-4 mb-4"; // responsive columns

        col.innerHTML = `
        <div class="card h-100" ">
            <img src="${car.image}" class="card-img-top" alt="${car["Car Name"]}">
            <div class="card-body">
                <h5 class="card-title">${car["Car Name"]}</h5>
                <p class="small">Karachi</p>
                <div class="small specs d-flex gap-2 justify-content-evenly flex-wrap">
                    <span>${car["Model Year"]}</span>
                    <span>${car.Mileage}</span>
                    <span>${car["Engine/Hybrid/Electric"]}</span>
                    <span>${car["Engine Power (CC)"]}</span>
                    <span>${car["Auto/Manual"]}</span>
                </div>
                <div class="d-flex justify-content-between mt-2">
                    <h5 class="align-content-end">${car.Price}</h5>
                    <a href="product.html?id=${car.id}" class="btn btn-primary">View</a>
                </div>
            </div>
        </div>
        `;

        container.appendChild(col);
        });
    </script>
