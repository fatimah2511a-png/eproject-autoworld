    <style>
        .specs span::after {
            content: "|";

        }

        content: "";
        }

<body>

    <div class="container my-5 py-5">
        <div class="container d-flex justify-content-between align-items-center navbar-custom">

            <!-- Logo -->
            <div class="d-flex align-items-center">
                <img src="Auto world logo.png" width="70" height="90" alt="AutoWorld Logo" class="navbar-logo me-2">
                <!-- <h4 class="m-0 fw-bold text-dark">AutoWorld</h4> -->
            </div>

            <!-- Links -->
            <ul class="nav align-items-center">
                <li class="nav-item"><a class="nav-link nav-btn" href="AutoWorld.html">Home</a></li>
                <li class="nav-item"><a class="nav-link nav-btn" href="Catalogue.html">Catalogue</a></li>
                <li class="nav-item"><a class="nav-link nav-btn" href="schemes.html">Schemes</a></li>
                <li class="nav-item"><a class="nav-link nav-btn" href="Car Finance.html">Finance</a></li>
                <li class="nav-item"><a class="nav-link nav-btn" href="Compare Cars.html">Compare</a></li>
                <li class="nav-item"><a class="nav-link nav-btn" href="About.html">About</a></li>
                <li class="nav-item"><a class="nav-link nav-btn" href="Contact.html">Contact</a></li>
            </ul>

        </div>


        <h2>Catalogue</h2>

        <div class="container mt-4">
            <div class="row" id="product-container"></div>
        </div>

    </div>
    

    <footer class="mt-5 pt-5 bg-dark">
        <div class="d-flex justify-content-center gap-2">
            <img src="Facebook logo.png" style="width: 50px; height: 50px;"  class="rounded-circle" alt="Facebook logo">
            <img src="Insta logo.jpg" style="width: 50px; height: 50px;" class="rounded-circle" alt="Instagram logo">
            <img src="Twitter logo.png" style="width: 50px; height: 50px;" class="rounded-circle" alt="Twitter logo">
        </div>

        <div class="mx-auto w-25 mt-3 text-center">
            <a class="px-1 text-decoration-none text-white" href="AutoWorld.html">Home</a>
            <a class="px-1 text-decoration-none text-white" href="About.html">About</a>
            <a class="px-1 text-decoration-none text-white" href="Catalogue.html">Catalogue</a>
            <a class="px-1 text-decoration-none text-white" href="schemes.html">schemes</a>

        <p class="text-center mt-3 text-secondary"> © 2023 AutoWorld. -All Rights Reserved.</p>
    </footer>


    <!-- this script contains car data -->
     <script src="cars_information.js"></script>
    <!-- add scripts to dynamically load cards -->
    <script>
        const container = document.getElementById("product-container");

        cars.forEach(car => {
        const col = document.createElement("div");
        col.className = "col-md-4 mb-4"; // responsive columns

        col.innerHTML = `
        <div class="card h-100" ">
            <img src="${car.image}" class="card-img-top" alt="${car.title}">
            <div class="card-body">
                <h5 class="card-title">${car["Car Name"]}</h5>
                <p class="small">Karachi</p>
                <div class="small specs d-flex gap-2 justify-content-evenly flex-wrap">
                    <span>${car["Model Year"]}</span>
                    <span>${car.Mileage}</span>
                    <span>${car["Engine/Hybrid/Electric"]}</span>
                    <span>${car["Engine Power (CC)"]}</span>
                    <span>${car["Auto/Manual"]}</span>
                </div>
                <div class="d-flex justify-content-between mt-2">
                    <h5 class="align-content-end">${car.Price}</h5>
                    <a href=""details.html?id=${car.id}"" class="btn btn-primary">View</a>
                </div>
            </div>
        </div>
        `;

        container.appendChild(col);
        });
    </script>
</body>
</html>
